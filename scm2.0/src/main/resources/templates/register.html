<!DOCTYPE html>
<html lang="en" data-th-replace="~{base::parent(~{::#content},~{::title},~{::script})}">

<head>
    <title>Register Page</title>
</head>

<body>
    <div id="content">
        <div class="grid grid-cols-12">
            <!-- this means it occupy 6 columns -->
            <div class="col-span-4 md:col-span-2 lg:col-span-3 xl:col-span-4"></div>
            <div class="col-span-12 md:col-span-8 lg:col-span-6 xl:col-span-4">
                <div
                    class="block p-6 bg-white border-t-8 border-blue-800 shadow rounded-xl dark:bg-gray-800 dark:border-blue-800">

                    <!-- Message toast -->
                    <div data-th-replace="~{Message::messagebox}"></div>
                    <h5 class="mb-2 text-2xl font-bold tracking-tight text-gray-900 dark:text-white">Signup Here</h5>
                    <p class="font-normal text-gray-400 dark:text-gray-400">
                        Start Managing Contacts on Cloud...
                    </p>
                    <form data-th-action="@{'/do-register'}" method="POST" data-th-object="${userForm}" novalidate
                        class="mt-5">
                        <div class="mb-3">
                            <label for="name"
                                class="block mb-1 text-sm font-medium text-gray-900 dark:text-white">Name</label>
                            <input type="text" id="name" data-th-field="*{name}"
                                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                placeholder="Enter Your Name " required />
                            <p data-th-if="${#fields.hasErrors('name')}" data-th-errors="*{name}"
                                class="px-1 py-2 text-red-600"></p>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="block mb-1 text-sm font-medium text-gray-900 dark:text-white">Your
                                email</label>
                            <input type="email" id="email" data-th-field="*{email}"
                                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                placeholder="name@Example.com" required />
                            <p data-th-if="${#fields.hasErrors('email')}" data-th-errors="*{email}"
                                class="px-1 py-2 text-red-600"></p>
                        </div>
                        <div class="mb-3">
                            <label for="phone"
                                class="block mb-1 text-sm font-medium text-gray-900 dark:text-white">Phone Number
                            </label>
                            <input type="text" id="phone" data-th-field="*{phoneNumber}"
                                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                placeholder="0123456789" required />
                            <p data-th-if="${#fields.hasErrors('phoneNumber')}" data-th-errors="*{phoneNumber}"
                                class="px-1 py-2 text-red-600"></p>
                        </div>
                        <div class="mb-3">
                            <label for="password"
                                class="block mb-1 text-sm font-medium text-gray-900 dark:text-white">Your
                                Password</label>
                            <input type="password" id="password" data-th-field="*{password}"
                                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                placeholder="**********" required />
                            <p data-th-if="${#fields.hasErrors('password')}" data-th-errors="*{password}"
                                class="px-1 py-2 text-red-600"></p>
                        </div>
                        <div class="mb-3">
                            <label for="about"
                                class="block mb-1 text-sm font-medium text-gray-900 dark:text-white">Write Something
                                about Yourself</label>
                            <textarea id="about" rows="3" data-th-field="*{about}"
                                class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                placeholder="Write Something About ..."></textarea>
                            <p data-th-if="${#fields.hasErrors('about')}" data-th-errors="*{about}"
                                class="px-1 py-2 text-red-600"></p>

                        </div>
                        <div class="flex justify-center space-x-3">
                            <button type="submit"
                                class="px-3 py-2 text-white bg-blue-700 rounded dark:bg-blue-700 dark:hover:bg-blue-800 hover:bg-blue-800">
                                Sign up
                            </button>
                            <button type="reset"
                                class="px-3 py-2 text-white bg-red-700 rounded dark:bg-red-700 dark:hover:bg-red-800 hover:bg-red-800">
                                Reset
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>

    </div>
    <script>
        console.log("hello Register");
    </script>

</body>

</html>
